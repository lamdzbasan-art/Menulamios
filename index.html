<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MENU LÂM IOS</title>
<style>
:root { --primary: #00ffcc; --bg-dark: #0f1219; --card-bg: #171d26; --text: #ffffff; --text-dim: #a0aec0; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background-color: var(--bg-dark); color: var(--text); font-family: sans-serif; padding: 20px; }
.menu-container { max-width: 400px; margin: auto; text-align: center; }
.menu-header { font-size: 24px; font-weight: bold; color: var(--primary); margin-bottom: 20px; }
.section { background: rgba(255, 255, 255, 0.03); padding: 15px; border-radius: 10px; margin-bottom: 15px; }
.section-title { font-size: 15px; font-weight: bold; margin-bottom: 10px; color: var(--text-dim); }
.key-box { display: flex; gap: 10px; }
#key-input { flex: 1; padding: 10px; border-radius: 5px; border: none; }
#btn-activate { padding: 10px 20px; background: var(--primary); border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
</style>
</head>
<body>

<div class="menu-container">
  <div class="menu-header">MENU LÂM IOS</div>

  <!-- PHẦN MENU VIP (Sẽ bị ẩn) -->
  <div id="menu-vip" style="display: none;">
    <div class="section">
      <div class="section-title">CÀI ĐẶT AIMBOT</div>
      <button>Bật Aim</button>
    </div>
  </div>

  <!-- PHẦN NHẬP KEY -->
  <div class="section" id="login-section">
    <div class="section-title">Kích Hoạt Key</div>
    <div class="key-box">
      <input type="text" id="key-input" placeholder="Nhập Key...">
      <button id="btn-activate">Bật</button>
    </div>
  </div>
</div>

<script type="module" src="script.js"></script>
</body>
</html>
